name: release

# Build the portable exes (x64 + arm64) and attach them to a GitHub Release on a version tag:
#   git tag v0.3.1 && git push origin v0.3.1
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test tests/ClaudeStatusBar.Tests -c Release

      - name: Publish x64
        run: dotnet publish src/ClaudeStatusBar -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o out-x64

      - name: Publish arm64
        run: dotnet publish src/ClaudeStatusBar -c Release -r win-arm64 --self-contained -p:PublishSingleFile=true -o out-arm64

      - name: Stage release assets
        run: |
          Copy-Item out-x64/ClaudeStatusBar.exe ClaudeStatusBar.exe
          Copy-Item out-arm64/ClaudeStatusBar.exe ClaudeStatusBar-arm64.exe

      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClaudeStatusBar.exe
            ClaudeStatusBar-arm64.exe
          generate_release_notes: true
