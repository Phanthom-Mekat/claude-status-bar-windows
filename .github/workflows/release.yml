name: release

# Build the framework-dependent app bundle and attach it to a GitHub Release on a version tag:
#   git tag v0.4.0 && git push origin v0.4.0
# Framework-dependent (loose .dll) so it can be launched via the Microsoft-signed `dotnet` host,
# which runs even under Windows Smart App Control (no signing needed). One bundle works on x64 + arm64.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test tests/ClaudeStatusBar.Tests -c Release

      - name: Publish (framework-dependent, portable)
        run: dotnet publish src/ClaudeStatusBar -c Release -o out

      - name: Zip the app bundle
        run: Compress-Archive -Path out/* -DestinationPath ClaudeStatusBar.zip -Force

      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeStatusBar.zip
          generate_release_notes: true
